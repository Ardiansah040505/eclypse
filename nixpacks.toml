# nixpacks.toml - Railway deployment config for Laravel + PHP 8.4

[variables]
# Force PHP 8.4 across ALL phases (setup, install, build, start)
PHP_VERSION = "8.4"
PORT = "8000"

[phases.setup]
# Install PHP 8.4 with all extensions required by Laravel
nixPkgs = [
    "php84",
    "php84Extensions.pdo",
    "php84Extensions.pdo_mysql",
    "php84Extensions.mbstring",
    "php84Extensions.xml",
    "php84Extensions.curl",
    "php84Extensions.zip",
    "php84Extensions.bcmath",
    "php84Extensions.tokenizer",
    "php84Extensions.ctype",
    "php84Extensions.fileinfo",
    "php84Extensions.openssl",
    "php84Extensions.gd",
    "php84Extensions.intl",
    "php84Packages.composer"
]

[phases.install]
cmds = [
    "composer install --optimize-autoloader --no-dev --no-interaction --no-scripts"
]

[phases.build]
cmds = [
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

[start]
cmd = "php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"
